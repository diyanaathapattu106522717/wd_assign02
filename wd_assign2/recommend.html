<section class="hero">
<h1>Restaurant Recommendations</h1>
<p>Select your preferences to find the best match.</p>
</section>

<section class="recommend-form">
    <h2>Find a Restaurant</h2>

    <label for="diet">Dietary Preference:</label>
    <select id="diet">
        <option value="none">None</option>
        <option value="vegan">Vegan</option>
        <option value="halal">Halal</option>
    </select>

    <label for="budget">Budget Range:</label>
    <select id="budget">
        <option value="low">$15–$25</option>
        <option value="medium">$25–$40</option>
        <option value="high">$40+</option>
    </select>

    <label for="purpose">Dining Purpose:</label>
    <select id="purpose">
        <option value="family">Family</option>
        <option value="date">Date</option>
        <option value="business">Business</option>
    </select>

    <button id="recommendBtn">Get Recommendation</button>
</section>

<section id="results"></section>  <!-- id for js -->
